name: Release Bob plugin

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Verify source
        run: |
          node --check bridge/bridge.mjs
          node --check plugin/main.js
          node --test test/bridge.test.mjs
          jq empty plugin/info.json
          jq empty ocr-plugin/info.json

      - name: Build Bob plugin
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="$(jq -er '.version | select(type == "string")' plugin/info.json)"
          ocr_version="$(jq -er '.version | select(type == "string")' ocr-plugin/info.json)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid plugin version: $version" >&2
            exit 1
          fi
          if [[ "$ocr_version" != "$version" ]]; then
            echo "Plugin versions do not match: $version != $ocr_version" >&2
            exit 1
          fi

          tag="v${version}"
          translator_asset="codex-local-translator-${tag}.bobplugin"
          ocr_asset="codex-local-ocr-${tag}.bobplugin"
          mkdir -p dist
          zip -j "dist/${translator_asset}" plugin/info.json plugin/main.js
          zip -j "dist/${ocr_asset}" ocr-plugin/info.json plugin/main.js
          sha256sum "dist/${translator_asset}" > "dist/${translator_asset}.sha256"
          sha256sum "dist/${ocr_asset}" > "dist/${ocr_asset}.sha256"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "translator_asset=${translator_asset}" >> "$GITHUB_OUTPUT"
          echo "ocr_asset=${ocr_asset}" >> "$GITHUB_OUTPUT"

      - name: Check existing release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.package.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Release ${{ steps.package.outputs.tag }} already exists; bump plugin/info.json to publish a new version."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        if: steps.release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.package.outputs.tag }}" \
            "dist/${{ steps.package.outputs.translator_asset }}#Bob translation plugin" \
            "dist/${{ steps.package.outputs.translator_asset }}.sha256#Translation plugin SHA-256" \
            "dist/${{ steps.package.outputs.ocr_asset }}#Bob OCR plugin" \
            "dist/${{ steps.package.outputs.ocr_asset }}.sha256#OCR plugin SHA-256" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.package.outputs.tag }}" \
            --generate-notes
